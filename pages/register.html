<!doctype html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register page</title>
<link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/style.css">
<link rel="stylesheet" href="../assets/css/dark-mode.css">
<link rel="stylesheet" href="../assets/css/rtl.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
  <link rel="icon" type="image/svg+xml" href="../assets/images/favicon.svg" />
</head>
<body class="Register-page">
<!-- REGISTER PAGE START -->
<section class="rp-sec">
  <div class="rp-container">

    <form class="rp-form">
      <div class="rp-brand">
        <span class="rp-logo" aria-hidden="true">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path fill="currentColor" d="M12 2c-2.6 0-5 1.4-6.3 3.7l6.3 3.6 6.3-3.6C17 3.4 14.6 2 12 2Zm-7 6.6v5.1c0 2.6 1.4 5 3.7 6.3l3.3-6-7-5.4Zm14 0-7 5.4 3.3 6c2.3-1.3 3.7-3.7 3.7-6.3V8.6Z" />
          </svg>
        </span>
        <div>
          <p class="rp-brand-title">Boutique Yarn</p>
          <p class="rp-brand-sub">Craft Supply Studio</p>
        </div>
      </div>

      <h2 class="rp-title">Create Account</h2>
      <p class="rp-sub">Start your creative journey today</p>

      <!-- NAME -->
      <div class="rp-field">
        <input type="text" required>
        <label>Full Name</label>
      </div>

      <!-- EMAIL -->
      <div class="rp-field">
        <input type="email" required>
        <label>Email Address</label>
      </div>

      <!-- PASSWORD -->
      <div class="rp-field">
        <input type="password" required>
        <label>Password</label>
      </div>

      <!-- CONFIRM PASSWORD -->
      <div class="rp-field">
        <input type="password" required>
        <label>Confirm Password</label>
      </div>

      <!-- TERMS -->
      <label class="rp-terms">
        <input type="checkbox" required>
        I agree to the Terms & Conditions
      </label>

      <!-- BUTTON -->
      <button class="rp-btn">Create Account</button>

      <!-- LOGIN LINK -->
      <p class="rp-footer">
        Already have an account? <a href="login.html">Login</a>
      </p>

    </form>

  </div>
</section>
<!-- REGISTER PAGE END -->
