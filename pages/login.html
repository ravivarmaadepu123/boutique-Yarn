<!doctype html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login page</title>
<link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/style.css">
<link rel="stylesheet" href="../assets/css/dark-mode.css">
<link rel="stylesheet" href="../assets/css/rtl.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
  <link rel="icon" type="image/svg+xml" href="../assets/images/favicon.svg" />
</head>
<body class="Login-page">
<!-- LOGIN PAGE START -->
<section class="lp-sec">
  <div class="lp-container">

    <form class="lp-form">
      <div class="lp-brand">
        <span class="lp-logo" aria-hidden="true">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path fill="currentColor" d="M12 2c-2.6 0-5 1.4-6.3 3.7l6.3 3.6 6.3-3.6C17 3.4 14.6 2 12 2Zm-7 6.6v5.1c0 2.6 1.4 5 3.7 6.3l3.3-6-7-5.4Zm14 0-7 5.4 3.3 6c2.3-1.3 3.7-3.7 3.7-6.3V8.6Z" />
          </svg>
        </span>
        <div>
          <p class="lp-brand-title">Boutique Yarn</p>
          <p class="lp-brand-sub">Craft Supply Studio</p>
        </div>
      </div>

      <h2 class="lp-title">Welcome Back</h2>
      <p class="lp-sub">Login to continue your journey</p>

      <!-- EMAIL -->
      <div class="lp-field">
        <input type="email" required>
        <label>Email Address</label>
      </div>

      <!-- PASSWORD -->
      <div class="lp-field">
        <input type="password" required>
        <label>Password</label>
      </div>

      <!-- OPTIONS -->
      <div class="lp-options">
        <label class="lp-remember">
          <input type="checkbox">
          Remember me
        </label>

        <a href="#" class="lp-forgot">Forgot Password?</a>
      </div>

      <!-- BUTTON -->
      <button class="lp-btn">Login</button>

      <!-- SIGNUP -->
      <p class="lp-footer">
        Donâ€™t have an account? <a href="register.html">Sign up</a>
      </p>

    </form>

  </div>
</section>
<!-- LOGIN PAGE END -->
